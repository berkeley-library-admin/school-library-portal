<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Library Portal</title>
    <style>
        body { background-color: #f4f6f9; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
        h2 { text-align: center; margin-bottom: 20px; color: #005a70; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        button { width: 100%; padding: 10px; background-color: #005a70; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #004454; }
        .error { color: red; font-size: 0.85rem; text-align: center; margin-bottom: 10px; }
        .hint { font-size: 0.8rem; color: #777; margin-top: 15px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Library Portal Login</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <div class="hint">
            <strong>Testing Accounts:</strong><br>
            Admin Account -> User: <code>admin</code> | Pass: <code>admin123</code><br>
            Student Account -> User: <code>student</code> | Pass: <code>student123</code>
        </div>
    </div>
</body>
</html>
